# scripts/install.py
#!/usr/bin/env python3
"""
WiFi Profile Extractor Installation Script

This script provides an interactive installation process for
the WiFi Profile Extractor on Windows systems.
"""

import os
import sys
import subprocess
import platform
from pathlib import Path


def print_banner():
    """Print installation banner."""
    print("=" * 60)
    print("🔐 WiFi Profile Extractor - Installation Script")
    print("=" * 60)
    print()


def check_system():
    """Check system requirements."""
    print("🔍 Checking system requirements...")
    
    # Check operating system
    if platform.system().lower() != "windows":
        print("❌ This application requires Windows OS")
        return False
    
    print("✅ Windows OS detected")
    
    # Check Python version
    if sys.version_info < (3, 8):
        print(f"❌ Python 3.8+ required. Current version: {sys.version}")
        return False
    
    print(f"✅ Python {sys.version.split()[0]} detected")
    
    return True


def check_admin():
    """Check if running as administrator."""
    try:
        import ctypes
        return ctypes.windll.shell32.IsUserAnAdmin()
    except Exception:
        return False


def install_dependencies():
    """Install Python dependencies."""
    print("\n📦 Installing dependencies...")
    
    try:
        # Upgrade pip
        subprocess.run([sys.executable, "-m", "pip", "install", "--upgrade", "pip"], 
                      check=True, capture_output=True)
        print("✅ pip upgraded")
        
        # Install requirements
        subprocess.run([sys.executable, "-m", "pip", "install", "-r", "requirements.txt"], 
                      check=True, capture_output=True)
        print("✅ Dependencies installed")
        
        # Install package
        subprocess.run([sys.executable, "-m", "pip", "install", "-e", "."], 
                      check=True, capture_output=True)
        print("✅ Package installed")
        
        return True
        
    except subprocess.CalledProcessError as e:
        print(f"❌ Installation failed: {e}")
        return False


def create_shortcuts():
    """Create desktop shortcuts."""
    print("\n🔗 Creating shortcuts...")
    
    try:
        import winshell
        from win32com.client import Dispatch
        
        desktop = winshell.desktop()
        
        # Create shortcut
        shell = Dispatch('WScript.Shell')
        shortcut = shell.CreateShortCut(os.path.join(desktop, "WiFi Profile Extractor.lnk"))
        shortcut.Targetpath = sys.executable
        shortcut.Arguments = f'-m streamlit run "{Path.cwd() / "src" / "app.py"}"'
        shortcut.WorkingDirectory = str(Path.cwd())
        shortcut.IconLocation = sys.executable
        shortcut.save()
        
        print("✅ Desktop shortcut created")
        return True
        
    except ImportError:
        print("⚠️  Could not create shortcut (missing dependencies)")
        return False
    except Exception as e:
        print(f"⚠️  Could not create shortcut: {e}")
        return False


def main():
    """Main installation function."""
    print_banner()
    
    # Check system requirements
    if not check_system():
        print("\n❌ System requirements not met")
        input("Press Enter to exit...")
        sys.exit(1)
    
    # Check admin privileges
    is_admin = check_admin()
    print(f"🔐 Administrator privileges: {'Yes' if is_admin else 'No'}")
    if not is_admin:
        print("⚠️  For full functionality (password access), run as Administrator")
    
    # Install dependencies
    if not install_dependencies():
        print("\n❌ Installation failed")
        input("Press Enter to exit...")
        sys.exit(1)
    
    # Create shortcuts
    create_shortcuts()
    
    # Installation complete
    print("\n" + "=" * 60)
    print("🎉 Installation completed successfully!")
    print("=" * 60)
    print()
    print("📋 Next steps:")
    print("  1. Run the application:")
    print(f"     python -m streamlit run {Path.cwd() / 'src' / 'app.py'}")
    print("  2. Or use the desktop shortcut")
    print("  3. For password access, run as Administrator")
    print()
    print("📖 Documentation: README.md")
    print("🔒 Security Guide: docs/SECURITY.md")
    print("🐛 Report Issues: https://github.com/yourusername/wifi-profile-extractor/issues")
    print()
    
    # Offer to run now
    run_now = input("Would you like to run the application now? (y/N): ").lower()
    if run_now in ['y', 'yes']:
        print("\n🚀 Starting WiFi Profile Extractor...")
        try:
            subprocess.run([sys.executable, "-m", "streamlit", "run", "src/app.py"])
        except KeyboardInterrupt:
            print("\n👋 Application stopped")
    
    input("\nPress Enter to exit...")


if __name__ == "__main__":
    try:
        main()
    except KeyboardInterrupt:
        print("\n👋 Installation cancelled by user")
    except Exception as e:
        print(f"\n❌ Unexpected error: {e}")
        input("Press Enter to exit...")

