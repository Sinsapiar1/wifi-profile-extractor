# scripts/install.bat
@echo off
REM WiFi Profile Extractor - Windows Installation Script
REM This script automates the installation process on Windows

echo ============================================================
echo   WiFi Profile Extractor - Windows Installation
echo ============================================================
echo.

REM Check if Python is installed
python --version >nul 2>&1
if errorlevel 1 (
    echo ERROR: Python is not installed or not in PATH
    echo Please install Python 3.8+ from https://python.org
    pause
    exit /b 1
)

echo Python detected, proceeding with installation...
echo.

REM Check if we're in the right directory
if not exist "src\app.py" (
    echo ERROR: Please run this script from the project root directory
    echo The directory should contain src\app.py
    pause
    exit /b 1
)

REM Upgrade pip
echo Upgrading pip...
python -m pip install --upgrade pip
if errorlevel 1 (
    echo ERROR: Failed to upgrade pip
    pause
    exit /b 1
)

REM Install requirements
echo Installing dependencies...
python -m pip install -r requirements.txt
if errorlevel 1 (
    echo ERROR: Failed to install dependencies
    pause
    exit /b 1
)

REM Install package
echo Installing WiFi Profile Extractor...
python -m pip install -e .
if errorlevel 1 (
    echo ERROR: Failed to install package
    pause
    exit /b 1
)

echo.
echo ============================================================
echo   Installation completed successfully!
echo ============================================================
echo.
echo To run the application:
echo   python -m streamlit run src\app.py
echo.
echo For password access, run Command Prompt as Administrator
echo.

set /p run_now="Would you like to run the application now? (y/N): "
if /i "%run_now%"=="y" (
    echo.
    echo Starting WiFi Profile Extractor...
    python -m streamlit run src\app.py
)

pause