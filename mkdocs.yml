# mkdocs.yml
site_name: WiFi Profile Extractor
site_description: Professional WiFi profile extraction tool for Windows
site_author: WiFi Profile Extractor Team
site_url: https://github.com/yourusername/wifi-profile-extractor

# Repository
repo_name: yourusername/wifi-profile-extractor
repo_url: https://github.com/yourusername/wifi-profile-extractor
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2024 WiFi Profile Extractor Contributors

# Configuration
theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.ico
  logo: assets/logo.png

# Plugins
plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - minify:
      minify_html: true

# Customization
extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/wifi-profile-extractor
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/wifi-profile-extractor/

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:materialx.emoji.to_svg
      emoji_index: !!python/name:materialx.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: yourusername
      repo: wifi-profile-extractor
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Page tree
nav:
  - Home: 
    - Overview: index.md
    - Installation: installation.md
    - Quick Start: quickstart.md
  - User Guide:
    - Getting Started: user-guide/getting-started.md
    - Features: user-guide/features.md
    - Troubleshooting: user-guide/troubleshooting.md
  - Developer Guide:
    - API Reference: docs/API.md
    - Contributing: docs/CONTRIBUTING.md
    - Development Setup: developer-guide/setup.md
    - Testing: developer-guide/testing.md
  - Security:
    - Security Policy: docs/SECURITY.md
    - Best Practices: security/best-practices.md
  - About:
    - Changelog: CHANGELOG.md
    - License: LICENSE.md
    - Support: support.md

# Additional configuration files

---
# .flake8
[flake8]
max-line-length = 88
extend-ignore = E203, W503, E501
exclude = 
    .git,
    __pycache__,
    build,
    dist,
    venv,
    env,
    .venv,
    .env,
    tests/fixtures/*,
    docs/*
per-file-ignores =
    __init__.py:F401
    tests/*:S101
max-complexity = 10

---
# .coveragerc
[run]
source = src
omit = 
    */tests/*
    */test_*
    */conftest.py
    */venv/*
    */env/*
    setup.py
    */migrations/*

[report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[html]
directory = htmlcov

[xml]
output = coverage.xml

---
# tox.ini
[tox]
envlist = py38, py39, py310, py311, flake8, mypy, security
isolated_build = True

[testenv]
deps = 
    pytest
    pytest-cov
    pytest-mock
commands = pytest tests/ -v --cov=src --cov-report=term-missing

[testenv:flake8]
deps = flake8
commands = flake8 src/ tests/

[testenv:mypy]
deps = 
    mypy
    types-all
commands = mypy src/ --ignore-missing-imports

[testenv:security]
deps = 
    bandit
    safety
commands = 
    bandit -r src/
    safety check

[testenv:docs]
deps = 
    mkdocs
    mkdocs-material
commands = mkdocs build

---
# pytest.ini
[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -ra
    --strict-markers
    --strict-config
    --cov=src
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-fail-under=80
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    security: marks tests as security tests
    windows: marks tests that require Windows
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning

---
# .editorconfig
root = true

[*]
charset = utf-8
end_of_line = lf
indent_style = space
indent_size = 4
insert_final_newline = true
trim_trailing_whitespace = true

[*.{yml,yaml}]
indent_size = 2

[*.{json,md}]
indent_size = 2

[Makefile]
indent_style = tab

[*.bat]
end_of_line = crlf

